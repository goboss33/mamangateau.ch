# ---------------------------------------------------------------------------
# Variante "image pré-construite" (GitHub Actions → GHCR) : aucun build sur
# le VPS. Remplacer OWNER par le compte GitHub. Utilisée pour le déploiement
# piloté par MCP (stack Portainer).
# ---------------------------------------------------------------------------
services:
  mamangateau:
    image: ghcr.io/OWNER/mamangateau:latest
    container_name: mamangateau
    restart: unless-stopped
    mem_limit: 512m
    environment:
      # E-mail des devis (Brevo) — requis pour le configurateur
      - BREVO_API_KEY=${BREVO_API_KEY:-}
      - CARNET_HOOK_URL=${CARNET_HOOK_URL:-}
      - CARNET_HOOK_SECRET=${CARNET_HOOK_SECRET:-}
      - DEVIS_TO=${DEVIS_TO:-mamangateau.ch@gmail.com}
      - DEVIS_FROM_EMAIL=${DEVIS_FROM_EMAIL:-mamangateau.ch@gmail.com}
      - DEVIS_FROM_NAME=${DEVIS_FROM_NAME:-Maman Gâteau — Site}
      # Calcul de distance de livraison (Google Routes API) — optionnel
      - GOOGLE_MAPS_SERVER_KEY=${GOOGLE_MAPS_SERVER_KEY:-}
    networks:
      - proxy

networks:
  proxy:
    external: true
    name: ${NPM_NETWORK:-npm_default}
