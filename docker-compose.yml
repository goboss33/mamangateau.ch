# ---------------------------------------------------------------------------
# Maman Gâteau — déploiement derrière Nginx Proxy Manager
# Le site n'expose AUCUN port sur l'hôte : NPM le joint via le réseau docker.
# Variable NPM_NETWORK = nom du réseau de Nginx Proxy Manager
# (docker network ls | grep -i npm pour le trouver ; souvent "npm_default").
# ---------------------------------------------------------------------------
services:
  mamangateau:
    build: .
    image: mamangateau:latest
    container_name: mamangateau
    restart: unless-stopped
    mem_limit: 512m
    environment:
      # E-mail des devis (Brevo) — requis pour le configurateur
      - BREVO_API_KEY=${BREVO_API_KEY:-}
      - DEVIS_TO=${DEVIS_TO:-mamangateau.ch@gmail.com}
      - DEVIS_FROM_EMAIL=${DEVIS_FROM_EMAIL:-mamangateau.ch@gmail.com}
      - DEVIS_FROM_NAME=${DEVIS_FROM_NAME:-Maman Gâteau — Site}
      # Calcul de distance de livraison (Google Routes API) — optionnel
      - GOOGLE_MAPS_SERVER_KEY=${GOOGLE_MAPS_SERVER_KEY:-}
    networks:
      - proxy

networks:
  proxy:
    external: true
    name: ${NPM_NETWORK:-npm_default}
